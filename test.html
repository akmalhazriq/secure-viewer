<!DOCTYPE html>
<html>
<head>
    <title>Simple Secure Viewer</title>
    <!-- Load your compiled viewer script -->
    <script src="https://cdn.jsdelivr.net/gh/akmalhazriq/secure-viewer@main/lib/2.1.0/secure-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        /* The user controls the size here, just like an <img> tag */
        .my-image-wrapper {
            width: 100% !important;
            height: 100dvh !important;
        }
    </style>
</head>
<body>
    <div id="secure-image" class="my-image-wrapper"></div>

    <script>
        new SecureViewer({
            selector: '#secure-image',
            type: 'pdf', 
            /* url: 'https://ontheline.trincoll.edu/images/bookdown/sample-local-pdf.pdf', */
            url: '/test_encrypted_decoy.pdf',
            decryptionKey: "secret_test_key_999",

            watermark: true,
            watermarkOptions: {
                type: 'merged', // 'merged' or 'layer '
                image: 'https://dummyimage.com/200x200/000/fff.png&text=LOGO', // Optional
                header: 'INTERNAL USE ONLY', // Optional
                paragraph: 'akmalhazriq@example.com' // Optional
            },

            headless: false,
            sidebar: true,
            searchable: true,
            forceLocation: true,

            // Custom Security Toggles
            blurOnUnfocus: false,    // No annoying blur
            blockRightClick: false,  // Let users right click
            blockDragging: false,    // Let users drag the canvas
            blockShortcuts: false    // Don't block Ctrl+S
        });
    </script>
</body>
</html>
