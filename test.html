<!DOCTYPE html>
<html>
<head>
    <title>Simple Secure Viewer</title>
    <!-- Load your compiled viewer script -->
    <script src="https://cdn.jsdelivr.net/gh/akmalhazriq/secure-viewer@main/lib/1.3.10/secure-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        /* The user controls the size here, just like an <img> tag */
        .my-image-wrapper {
            width: 100% !important;
            height: 100dvh !important;
        }
    </style>
</head>
<body>
    <div id="secure-image" class="my-image-wrapper"></div>

    <script>
        new SecureViewer({
            selector: '#secure-image',
            type: 'pdf', 
            url: 'https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf',

            headless: true,
            sidebar: true,
            searchable: true,
            forceLocation: false,

            // Custom Security Toggles
            blurOnUnfocus: true,    // No annoying blur
            blockRightClick: true,  // Let users right click
            blockDragging: true,    // Let users drag the canvas
            blockShortcuts: false    // Don't block Ctrl+S
        });
    </script>
</body>
</html>
