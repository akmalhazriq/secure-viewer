<!DOCTYPE html>
<html>
<head>
    <title>Simple Secure Viewer</title>
    <!-- Load your compiled viewer script -->
    <script src="https://cdn.jsdelivr.net/gh/akmalhazriq/secure-viewer@main/lib/1.3.0/secure-viewer.min.js"></script>
    <style>
        /* The user controls the size here, just like an <img> tag */
        .my-image-wrapper {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="secure-image" class="my-image-wrapper"></div>

    <script>
        new SecureViewer({
            selector: '#secure-image',
            type: 'pdf', 
            url: 'https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf',

            headless: false,
            
            // Custom Security Toggles
            blurOnUnfocus: false,    // No annoying blur
            blockRightClick: false,  // Let users right click
            blockDragging: false,    // Let users drag the canvas
            blockShortcuts: false    // Don't block Ctrl+S
        });
    </script>
</body>
</html>
